<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <rect width="320" height="240" fill="#F8FAFC"/>
  <rect x="10" y="10" width="300" height="220" rx="12" fill="none" stroke="#64748B" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- tire outer -->
  <circle cx="160" cy="105" r="65" fill="#1E293B"/>
  <!-- tire tread -->
  <circle cx="160" cy="105" r="65" fill="none" stroke="#334155" stroke-width="8"/>
  <!-- rim -->
  <circle cx="160" cy="105" r="38" fill="#94A3B8"/>
  <circle cx="160" cy="105" r="18" fill="#64748B"/>
  <!-- spokes -->
  <line x1="160" y1="68" x2="160" y2="88" stroke="#1E293B" stroke-width="6"/>
  <line x1="160" y1="122" x2="160" y2="142" stroke="#1E293B" stroke-width="6"/>
  <line x1="123" y1="105" x2="143" y2="105" stroke="#1E293B" stroke-width="6"/>
  <line x1="177" y1="105" x2="197" y2="105" stroke="#1E293B" stroke-width="6"/>
  <text x="160" y="185" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1E293B">타이어</text>
  <text x="160" y="204" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748B">Tire</text>
  <text x="160" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9CA3AF">이미지를 교체하려면 tire.svg 파일을 수정하세요</text>
</svg>
