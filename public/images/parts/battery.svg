<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <rect width="320" height="240" fill="#FEFCE8"/>
  <rect x="10" y="10" width="300" height="220" rx="12" fill="none" stroke="#EAB308" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- battery body -->
  <rect x="85" y="75" width="150" height="90" rx="8" fill="#EAB308" opacity="0.9"/>
  <!-- battery terminals -->
  <rect x="110" y="62" width="25" height="16" rx="4" fill="#CA8A04"/>
  <rect x="185" y="62" width="25" height="16" rx="4" fill="#CA8A04"/>
  <!-- plus/minus -->
  <text x="122" y="57" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#854D0E">+</text>
  <text x="197" y="57" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#854D0E">-</text>
  <!-- lightning bolt -->
  <polygon points="168,85 148,115 163,115 152,155 180,108 162,108" fill="white" opacity="0.9"/>
  <text x="160" y="182" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#713F12">시동 배터리</text>
  <text x="160" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A16207">Car Battery</text>
  <text x="160" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9CA3AF">이미지를 교체하려면 battery.svg 파일을 수정하세요</text>
</svg>
