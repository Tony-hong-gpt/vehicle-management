<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <rect width="320" height="240" fill="#F0FDF4"/>
  <rect x="10" y="10" width="300" height="220" rx="12" fill="none" stroke="#22C55E" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- air cleaner box -->
  <rect x="90" y="65" width="140" height="90" rx="10" fill="#22C55E" opacity="0.8"/>
  <rect x="100" y="75" width="120" height="70" rx="6" fill="#16A34A" opacity="0.5"/>
  <!-- filter lines -->
  <line x1="110" y1="80" x2="110" y2="138" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="125" y1="80" x2="125" y2="138" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="140" y1="80" x2="140" y2="138" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="155" y1="80" x2="155" y2="138" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="170" y1="80" x2="170" y2="138" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="185" y1="80" x2="185" y2="138" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="200" y1="80" x2="200" y2="138" stroke="white" stroke-width="3" opacity="0.5"/>
  <!-- air flow arrows -->
  <text x="160" y="172" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#14532D">에어클리너</text>
  <text x="160" y="191" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#16A34A">Air Cleaner / Air Filter</text>
  <text x="160" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9CA3AF">이미지를 교체하려면 air-cleaner.svg 파일을 수정하세요</text>
</svg>
