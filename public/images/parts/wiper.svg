<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <rect width="320" height="240" fill="#F0F9FF"/>
  <rect x="10" y="10" width="300" height="220" rx="12" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- windshield arc -->
  <path d="M 60 160 Q 160 40 260 160" fill="none" stroke="#BAE6FD" stroke-width="30" stroke-linecap="round"/>
  <!-- wiper arm -->
  <line x1="90" y1="155" x2="230" y2="90" stroke="#0369A1" stroke-width="5" stroke-linecap="round"/>
  <!-- wiper blade -->
  <line x1="88" y1="158" x2="228" y2="93" stroke="#0EA5E9" stroke-width="9" stroke-linecap="round" opacity="0.9"/>
  <!-- pivot -->
  <circle cx="90" cy="156" r="7" fill="#0369A1"/>
  <!-- rain drops -->
  <ellipse cx="130" cy="75" rx="4" ry="6" fill="#7DD3FC" opacity="0.7"/>
  <ellipse cx="175" cy="60" rx="4" ry="6" fill="#7DD3FC" opacity="0.7"/>
  <ellipse cx="220" cy="78" rx="4" ry="6" fill="#7DD3FC" opacity="0.7"/>
  <text x="160" y="182" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0C4A6E">와이퍼 블레이드</text>
  <text x="160" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0284C7">Wiper Blade</text>
  <text x="160" y="225" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9CA3AF">이미지를 교체하려면 wiper.svg 파일을 수정하세요</text>
</svg>
